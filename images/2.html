<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记录 Post 模板 - FangTian's Note</title>
    <link rel="stylesheet" href="../../css/style.css">
    <script src="../../js/theme.js"></script>
</head>
<body>
    <header>
        <div class="container header-container">
            <h1><a href="../../index.html">FangTian's Note</a></h1>
            <nav>
                <a href="../../index.html">首页</a>
                <a href="../../records.html">记录</a>
                <a href="../../about.html">关于</a>
            </nav>
        </div>
    </header>

    <main class="container post-container">
        <article class="post-content record-post-template">
            <header class="post-header">
                <h1>记录 Post 模板：标题写在这里</h1>
                <div class="post-meta">
                    <span>2026-06-08</span>
                    <span class="post-category">records</span>
                </div>
            </header>

            <div class="post-body">
                <figure class="record-template-hero">
                    <img src="../../images/records/mountain-mist.jpg" alt="记录 Post 封面图">
                    <figcaption>封面图：替换为本次记录中最能代表现场的一张照片。</figcaption>
                </figure>

                <p>这里写下这次记录的开场：地点、时间、光线、拍摄动机，或者这篇 post 想保留下来的核心观察。</p>

                <section class="record-facts" aria-label="记录信息">
                    <div>
                        <span>地点</span>
                        <strong>城市 / 山野 / 工作台</strong>
                    </div>
                    <div>
                        <span>设备</span>
                        <strong>相机或手机型号</strong>
                    </div>
                    <div>
                        <span>关键词</span>
                        <strong>光线、路径、想法</strong>
                    </div>
                </section>

                <h2>现场记录</h2>
                <p>记录当时发生了什么、你看到了什么、为什么按下快门。文字可以短，但要具体。</p>

                <h2>照片组</h2>
                <div class="record-image-grid">
                    <img src="../../images/records/city-night.jpg" alt="照片示例一">
                    <img src="../../images/records/rain-window.jpg" alt="照片示例二">
                    <img src="../../images/records/desk-light.jpg" alt="照片示例三">
                </div>

                <h2>Post 摘要</h2>
                <p>最后写下可复用的结论：这次拍摄的有效方法、失败点、后续要继续观察的问题。</p>
            </div>
        </article>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 FangTian's Note | 基于纯 HTML/CSS/JS 构建</p>
        </div>
    </footer>
</body>
</html>
