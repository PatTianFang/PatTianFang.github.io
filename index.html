<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FangTian's Note</title>
    <link rel="stylesheet" href="css/style.css?v=1781573828">
    <script src="js/theme.js"></script>
</head>
<body>
    <header>
        <div class="container header-container">
            <h1><a href="index.html">FangTian's Note</a></h1>
            <nav>
                <a href="index.html" class="active">首页</a>
                <a href="records.html">记录</a>
                <a href="about.html">关于</a>
            </nav>
        </div>
    </header>
    <main class="container home-page">
        <section class="site-hero" aria-labelledby="site-title">
            <div class="site-hero-copy">
                <p class="records-kicker">Notebook</p>
                <h2 id="site-title">FangTian's Note</h2>
                <p>把学习笔记、PDF 资料和路上的照片整理成一个安静好找的个人知识库。</p>
                <div class="site-hero-actions">
                    <a href="#library" class="hero-action-primary">浏览笔记</a>
                    <a href="records.html">查看记录</a>
                </div>
            </div>
            <div class="site-stats" aria-label="站点概览">
                <div>
                    <span id="stat-posts">--</span>
                    <p>文章</p>
                </div>
                <div>
                    <span id="stat-categories">--</span>
                    <p>分类</p>
                </div>
                <div>
                    <span id="stat-records">--</span>
                    <p>记录</p>
                </div>
                <div>
                    <span id="stat-latest">--</span>
                    <p>最近更新</p>
                </div>
            </div>
        </section>

        <section class="home-panels" aria-label="最近内容">
            <section class="home-panel" aria-labelledby="latest-posts-title">
                <div class="section-heading-row">
                    <div>
                        <p class="records-kicker">Latest</p>
                        <h2 id="latest-posts-title">最近文章</h2>
                    </div>
                    <a href="#library">全部文章</a>
                </div>
                <div id="latest-post-list" class="latest-list">
                    <p class="empty-message">正在加载最近文章...</p>
                </div>
            </section>
            <section class="home-panel" aria-labelledby="latest-records-title">
                <div class="section-heading-row">
                    <div>
                        <p class="records-kicker">Records</p>
                        <h2 id="latest-records-title">最近记录</h2>
                    </div>
                    <a href="records.html">全部记录</a>
                </div>
                <div id="latest-record-list" class="latest-record-list">
                    <p class="empty-message">正在加载记录...</p>
                </div>
            </section>
        </section>

        <section class="library-section" id="library" aria-labelledby="library-title">
            <div class="section-heading-row library-heading">
                <div>
                    <p class="records-kicker">Library</p>
                    <h2 id="library-title">文章索引</h2>
                </div>
                <label class="sort-control">
                    <span>排序</span>
                    <select id="post-sort">
                        <option value="newest">最新优先</option>
                        <option value="oldest">最早优先</option>
                        <option value="title">标题 A-Z</option>
                    </select>
                </label>
            </div>
        <section class="search-section search-toolbar" aria-label="搜索文章">
            <input
                type="search"
                id="post-search"
                class="search-input"
                placeholder="搜索标题、分类或摘要"
                autocomplete="off"
            >
            <button type="button" id="clear-search" class="clear-search-btn">清除</button>
            <div id="result-count" class="result-count" aria-live="polite"></div>
        </section>
        <div class="filter-section" id="filter-section">
            <!-- 分类过滤器由 JS 动态生成 -->
        </div>
        <div id="post-list" class="post-list">
            <p>正在加载文章列表...</p>
        </div>
        <nav id="pagination" class="pagination" aria-label="文章分页"></nav>
        </section>
    </main>
    <footer>
        <div class="container">
            <p>&copy; 2026 FangTian's Note | 基于纯 HTML/CSS/JS 构建</p>
        </div>
    </footer>
    <script src="js/main.js"></script>
</body>
</html>
