<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记录 - FangTian's Note</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
</head>
<body>
    <header>
        <div class="container header-container">
            <h1><a href="index.html">FangTian's Note</a></h1>
            <nav>
                <a href="index.html">首页</a>
                <a href="records.html" class="active">记录</a>
                <a href="about.html">关于</a>
            </nav>
        </div>
    </header>

        <section class="records-section" id="record-posts" aria-labelledby="record-posts-title">
            <div class="records-section-head">
                <p class="records-kicker">Posts</p>
                <h2 id="record-posts-title">Post 记录</h2>
                <p class="records-section-desc">每张卡片凝住一篇记录的开篇：标题、瞬间与最初落下的那一句。</p>
            </div>
            <div class="search-section" aria-label="搜索记录">
                <input
                    type="search"
                    id="post-search"
                    class="search-input"
                    placeholder="搜索记录标题"
                    autocomplete="off"
                >
                <div id="result-count" class="result-count" aria-live="polite"></div>
            </div>
            <div id="record-post-list" class="records-post-grid">
                <p class="empty-message">正在扫描 images/ 下的记录…</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 FangTian's Note | 基于纯 HTML/CSS/JS 构建</p>
        </div>
    </footer>
    <script src="js/records.js"></script>
</body>
</html>
