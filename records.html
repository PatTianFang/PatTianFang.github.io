<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记录 - FangTian's Note</title>
    <link rel="stylesheet" href="css/style.css?v=1781573828">
    <script src="js/theme.js"></script>
</head>
<body>
    <header>
        <div class="container header-container">
            <h1><a href="index.html">FangTian's Note</a></h1>
            <nav>
                <a href="index.html">首页</a>
                <a href="records.html" class="active">记录</a>
                <a href="about.html">关于</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="records-section records-index-section" id="record-posts" aria-labelledby="record-posts-title">
            <div class="records-section-head records-index-head">
                <div>
                    <p class="records-kicker">Records</p>
                    <h2 id="record-posts-title">旅行与生活记录</h2>
                    <p class="records-section-desc">用照片、时间和地点把路上的片段收好，回看时不用翻很久。</p>
                </div>
                <div class="records-stats" aria-label="记录概览">
                    <div>
                        <span id="record-total">--</span>
                        <p>记录</p>
                    </div>
                    <div>
                        <span id="record-photo-total">--</span>
                        <p>照片</p>
                    </div>
                    <div>
                        <span id="record-place-total">--</span>
                        <p>地点</p>
                    </div>
                </div>
            </div>
            <section class="record-control-panel" aria-label="记录筛选和时间线">
                <div class="record-toolbar">
                    <section class="search-section search-toolbar" aria-label="搜索记录">
                        <input
                            type="search"
                            id="post-search"
                            class="search-input"
                            placeholder="搜索记录标题、地点或日期"
                            autocomplete="off"
                        >
                        <button type="button" id="clear-search" class="clear-search-btn">清除</button>
                        <div id="result-count" class="result-count" aria-live="polite"></div>
                    </section>
                    <label class="sort-control">
                        <span>排序</span>
                        <select id="record-sort">
                            <option value="newest">最新优先</option>
                            <option value="oldest">最早优先</option>
                            <option value="place">地点 A-Z</option>
                        </select>
                    </label>
                </div>
                <div id="record-place-filters" class="filter-section record-place-filters"></div>
                <div class="record-timeline-section" aria-labelledby="record-timeline-title">
                    <div class="section-heading-row">
                        <div>
                            <p class="records-kicker">Timeline</p>
                            <h2 id="record-timeline-title">时间线</h2>
                        </div>
                        <span id="record-timeline-count" class="panel-note">正在整理...</span>
                    </div>
                    <div id="record-timeline" class="record-timeline">
                        <p class="empty-message">正在加载时间线...</p>
                    </div>
                </div>
            </section>
            <div id="record-post-list" class="records-post-grid">
                <p class="empty-message">正在加载记录...</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 FangTian's Note | 基于纯 HTML/CSS/JS 构建</p>
        </div>
    </footer>
    <script src="js/records.js"></script>
</body>
</html>
